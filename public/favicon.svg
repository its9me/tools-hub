<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <filter id="thLogoGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>

    <linearGradient id="innerRingGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#d946ef" stop-opacity="0.1" />
    </linearGradient>

    <linearGradient id="hPillarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
  </defs>

  <!-- Solid absolute dark circle background specifically for favicons to contrast well in both light & dark browser tabs -->
  <circle cx="60" cy="60" r="56" fill="#010314" />

  <circle 
    cx="60" 
    cy="60" 
    r="54" 
    stroke="url(#ringGrad)" 
    stroke-width="3.2" 
    fill="transparent" 
    filter="url(#thLogoGlow)"
    opacity="0.95"
  />

  <circle 
    cx="60" 
    cy="60" 
    r="50" 
    stroke="url(#innerRingGrad)" 
    stroke-width="1.2" 
    fill="#050716" 
    fill-opacity="0.85"
  />

  <g transform="translate(4, 5)">
    <path 
      d="M 32 39 
         L 32 45 
         L 42 45 
         L 42 71 
         C 42 74 44 76 48 76 
         L 51 76 
         L 51 45 
         L 66 45 
         L 66 39 
         L 66 28 
         L 34 35 Z" 
      fill="#FFFFFF" 
      stroke="#FFFFFF" 
      stroke-width="1.2" 
      stroke-linejoin="miter"
    />

    <path 
      d="M 57 26 
         L 57 77 
         C 57 80 59 81 63 81 
         L 67 81 
         L 67 56 
         L 77 56 
         L 77 81 
         C 77 84 79 85 83 85 
         L 87 85 
         L 87 26 
         C 87 23 85 22 81 22 
         L 77 22 
         L 77 47 
         L 67 47 
         L 67 26 
         C 67 23 65 22 61 22 Z" 
      fill="url(#hPillarGrad)" 
    />
  </g>

  <rect x="36" y="60" width="6" height="6" rx="1" fill="#c084fc" filter="url(#thLogoGlow)" />
  <rect x="42" y="66" width="8" height="8" rx="1.5" fill="#22d3ee" filter="url(#thLogoGlow)" />
  <rect x="32" y="73" width="7" height="7" rx="1.2" fill="#38bdf8" />
  <rect x="38" y="80" width="5.5" height="5.5" rx="1" fill="#3b82f6" />
</svg>
