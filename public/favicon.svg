<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Rounded Background -->
  <rect width="512" height="512" rx="140" fill="#0f172a" />
  <!-- Gradients -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14b8a6" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Glow Ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#grad1)" stroke-width="8" opacity="0.3" filter="url(#glow)"/>
  
  <!-- Central Hub Icon Geometry (Geometric Stylized 'T' & Tool Shape) -->
  <g id="logo-mark" filter="url(#glow)">
    <!-- The horizontal bar of the 'T' with curved edges, indicating a bridge/connectivity -->
    <rect x="120" y="140" width="272" height="60" rx="30" fill="url(#grad1)" />
    
    <!-- Vertical stem of the T with dual overlapping tracks indicating speed and math -->
    <rect x="226" y="215" width="60" height="170" rx="30" fill="url(#grad2)" />
    
    <!-- Central intersection accent circle (A glowing gear core) -->
    <circle cx="256" cy="170" r="45" fill="#0f172a" stroke="url(#grad1)" stroke-width="12" />
    <!-- Core star/spark -->
    <path d="M256,150 L261,165 L276,170 L261,175 L256,190 L251,175 L236,170 L251,165 Z" fill="url(#grad2)" />
    
    <!-- Sub-elements: Small tech circles representing calculator/convertor dots -->
    <circle cx="150" cy="170" r="12" fill="#0f172a" stroke="url(#grad1)" stroke-width="4" />
    <circle cx="362" cy="170" r="12" fill="#0f172a" stroke="url(#grad1)" stroke-width="4" />
    <circle cx="256" cy="340" r="12" fill="#0f172a" stroke="url(#grad2)" stroke-width="4" />
  </g>
</svg>
